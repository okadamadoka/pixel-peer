<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kurenaido&display=swap">
  <link rel="stylesheet" href="../css/tutorial.css">
  <link rel="stylesheet" href="../css/skuro-.css">
  <link rel="stylesheet" href="../css/hone.css">
  <link rel="stylesheet" href="../css/tenki-.css">
  <link rel="icon" href="../img/favicon.ico">
  <title>さつえい げんば</title>
</head>
<body class="dotgothic16-regular ">
<div id="loader">Now loading…</div>
<div id="cover">
  <div class="game-cover">
    <div class="game-wrapper">
      <div id="game-container"></div>
    </div>

    <div class="arrow-top">&#x2B9D;</div>
    <div class="arrow arrow-left">&#x2B9C;</div>
    <div class="arrow arrow-right">&#x2B9E;</div>
    <div class="arrow-bottom">&#x2B9F;</div>
  </div>
  <div class="hone-cover">
    <div class="phoneScreen">
          <div class="hone-reset"></div>
            <!-- スマホの中身（切り替え可能） -->
            <p id="item-name"></p>
            <div id="item-link"></div>
            <div class="hintcover">
              <div class="hint">&#x2B9F;</div>
            </div>
      </div>
      <!-- スマホの中にイルカの吹き出しを配置する -->
      <div id="dolphinTalk" class="windou"></div>
  </div>
</div>
  <!--こっちは卒制用です-->
  <script src="../js/room-2 end.js"></script>
  <!--
  正規はこっち
  <script src="../js/room-2.js"></script>
  -->
  <script src="../js/app.js"></script>
  <script src="../js/branch.js"></script>
  <script src="../js/skuro-.js"></script>
  <!--卒制専用のjs-->
  <script src="../end/hone end.js"></script>
  <!--
  こっちは本番用
  <script src="../js/hone.js"></script>
  -->
  <script src="../js/basyo.js"></script>
  <script src="../js/map.js"></script>
  <!--<script src="../js/basyo.js"></script>-->
  <script>
   Promise.all([
    new Promise(resolve => window.addEventListener('load', resolve)), // ページ読み込み完了
    new Promise(resolve => setTimeout(resolve, 1500)) // 最低1秒待つ
  ]).then(() => {
    const loader = document.getElementById('loader');
    const game = document.getElementById('cover');
    const phone = document.querySelector('.phoneScreen');

    loader.style.opacity = 0; // フェードアウト

    setTimeout(() => {
      loader.remove();
      game.style.opacity = 1;
      phone.style.opacity = 1;

      // ✅ itemsを生成する処理をここで呼ぶ！
      if (typeof initItems === 'function') {
        initItems(); // ← skuro-.js 内で定義されてるやつをここで実行！
      }
    }, 500); // フェードアウトの時間に合わせて少し待つ
  });
  localStorage.setItem('2', '["./2.html"]');
  </script>
</body>
</html>
